name: grocery-classify
version: "1.0"
description: Classifies grocery items through a hierarchical routing tree

input:
  item_name:
    type: string
    required: true

steps:
  - route:
      id: classify
      routing_agent: food-router
      input:
        item_name: $.input.item_name
      routes:
        food:
          route:
            id: food_sub
            routing_agent: food-subtype-router
            input:
              item_name: $.input.item_name
            routes:
              meat:
                route:
                  id: meat_sub
                  routing_agent: meat-router
                  input:
                    item_name: $.input.item_name
                  routes:
                    pork: classify-leaf
                    chicken: classify-leaf
                    beef: classify-leaf
                    _none:
                      short_circuit: true
                      defaults: {}
              produce:
                route:
                  id: produce_sub
                  routing_agent: produce-router
                  input:
                    item_name: $.input.item_name
                  routes:
                    fruit: classify-leaf
                    vegetable: classify-leaf
                    _none:
                      short_circuit: true
                      defaults: {}
              canned:
                route:
                  id: canned_sub
                  routing_agent: canned-router
                  input:
                    item_name: $.input.item_name
                  routes:
                    vegetable: classify-leaf
                    meat: classify-leaf
                    _none:
                      short_circuit: true
                      defaults: {}
              snack:
                route:
                  id: snack_sub
                  routing_agent: snack-router
                  input:
                    item_name: $.input.item_name
                  routes:
                    candy: classify-leaf
                    chip: classify-leaf
                    _none:
                      short_circuit: true
                      defaults: {}
              _none:
                short_circuit: true
                defaults: {}
        non_food:
          route:
            id: non_food_sub
            routing_agent: non-food-subtype-router
            input:
              item_name: $.input.item_name
            routes:
              medicine: classify-leaf
              merchandise: classify-leaf
              _none:
                short_circuit: true
                defaults: {}
        _none:
          short_circuit: true
          defaults: {}

output:
  classification: $.steps.classify.output
