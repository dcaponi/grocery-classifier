name: grocery-classify
version: "3.0"
description: Classifies grocery items through a hierarchical taxonomy (12 departments, 30 categories) using switch control flow

input:
  item_name:
    type: string
    required: true

steps:
  # ── Stage 1: Department classification ──
  - id: department
    agent: department-classifier
    input:
      item_name: $.input.item_name
    next:
      switch: output.department
      cases:
        produce: produce-category
        meat_seafood: meat-seafood-category
        deli_bakery: deli-bakery-category
        dairy_eggs: dairy-eggs-category
        frozen: frozen-category
        pantry: pantry-category
        snacks: snacks-category
        beverages: beverages-category
        health_wellness: health-wellness-category
        personal_care: personal-care-category
        household: household-category
        baby_pet: baby-pet-category
      default: _end

  # ── Stage 2: Sub-department classification (one per department) ──
  - id: produce-category
    agent: produce-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: meat-seafood-category
    agent: meat-seafood-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: deli-bakery-category
    agent: deli-bakery-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: dairy-eggs-category
    agent: dairy-eggs-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: frozen-category
    agent: frozen-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: pantry-category
    agent: pantry-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: snacks-category
    agent: snacks-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: beverages-category
    agent: beverages-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: health-wellness-category
    agent: health-wellness-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: personal-care-category
    agent: personal-care-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: household-category
    agent: household-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  - id: baby-pet-category
    agent: baby-pet-classifier
    input:
      item_name: $.input.item_name
    next: leaf

  # ── Stage 3: Leaf description ──
  - id: leaf
    agent: classify-leaf
    input:
      item_name: $.input.item_name

output:
  department: $.steps.department.output
  leaf: $.steps.leaf.output
