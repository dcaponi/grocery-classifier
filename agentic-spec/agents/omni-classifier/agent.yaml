name: Omni Classifier
description: Classifies a grocery item through the full taxonomy in a single call
type: llm
model: qwen2.5:7b
base_url: http://localhost:11434/v1
temperature: 0
schema: omni_classification
user_message: "Classify this grocery item through the full taxonomy.\n\nItem: {{item_name}}\n\nReturn the taxonomy_path as an array of exactly 2 elements [department, category], a confidence score, and brief reasoning."

input:
  item_name:
    type: string
    required: true
