name: Leaf Classifier
description: Provides a brief description of a classified grocery item
type: llm
model: mistral:7b
base_url: http://localhost:11434/v1
temperature: 0.1
schema: leaf_classification
user_message: "Describe this grocery item briefly.\n\nItem: {{item_name}}\n\nProvide a JSON response with: description (one sentence about the item), common_brands (array of 2-3 common brands), typical_price_range (string like '$2-5')."

input:
  item_name:
    type: string
    required: true
